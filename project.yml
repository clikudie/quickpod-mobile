name: QuickPod
options:
  bundleIdPrefix: com.quickpod
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  SWIFT_VERSION: "5.9"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  QuickPod:
    type: application
    platform: iOS
    sources:
      - QuickPod
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.quickpod.app
      INFOPLIST_FILE: QuickPod/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_ALLOWED: NO
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: QuickPod/Info.plist
      properties:
        CFBundleDisplayName: QuickPod
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
